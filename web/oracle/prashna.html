<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Myastro — Prashna (Horary)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
  <div id="nav"></div>
  <main class="max-w-3xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold text-purple-300 mb-2">🎯 Prashna (Horary)</h1>
    <p class="text-slate-400 mb-6">Ask a yes/no question. Chart cast at the moment of asking, from your current location.</p>

    <section class="p-5 rounded-xl bg-slate-900 border border-slate-800 mb-6 space-y-3">
      <div>
        <label class="block text-xs text-slate-400 mb-1">Your question</label>
        <textarea id="question" rows="3" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm"
                  placeholder="e.g. Will I get the job I applied for?"></textarea>
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">Your current location —
          <button id="geocode_btn" type="button" class="underline text-purple-300">Look up coordinates</button>
        </label>
        <input id="place" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm mb-2"
               placeholder="City, country (e.g. Shimla, India)">
        <p id="geo_status" class="text-xs text-slate-500 mb-2"></p>
        <div class="grid grid-cols-3 gap-2">
          <input id="lat" type="number" step="0.0001" placeholder="Lat"
                 class="bg-slate-950 border border-slate-700 rounded px-2 py-1 text-sm">
          <input id="lon" type="number" step="0.0001" placeholder="Lon"
                 class="bg-slate-950 border border-slate-700 rounded px-2 py-1 text-sm">
          <input id="tz" placeholder="Timezone" value="Asia/Kolkata"
                 class="bg-slate-950 border border-slate-700 rounded px-2 py-1 text-sm">
        </div>
      </div>
      <button id="gen_btn" class="px-4 py-2 rounded-lg bg-purple-600 hover:bg-purple-500 text-white font-semibold text-sm">
        Ask the Prashna ✨
      </button>
    </section>

    <div id="loading" class="hidden mb-4"></div>
    <div id="result" class="hidden"></div>
  </main>

  <script type="module">
    import { renderNav, renderResult, setLoading, renderError } from "../shared/components.js";
    import { oraclePrashna, geocode } from "../shared/api.js";

    renderNav("oracle");

    document.getElementById("geocode_btn").addEventListener("click", async () => {
      const place = document.getElementById("place").value.trim();
      if (!place) return;
      document.getElementById("geo_status").textContent = "Looking up…";
      try {
        const r = await geocode(place);
        if (!r) {
          document.getElementById("geo_status").textContent = "Not found.";
          return;
        }
        document.getElementById("lat").value = r.lat.toFixed(4);
        document.getElementById("lon").value = r.lon.toFixed(4);
        document.getElementById("tz").value  = r.tz;
        document.getElementById("place").value = r.name;
        document.getElementById("geo_status").textContent = `📍 ${r.name} (${r.tz})`;
      } catch (e) {
        document.getElementById("geo_status").textContent = "Lookup failed.";
      }
    });

    document.getElementById("gen_btn").addEventListener("click", async () => {
      const q   = document.getElementById("question").value.trim();
      const lat = parseFloat(document.getElementById("lat").value);
      const lon = parseFloat(document.getElementById("lon").value);
      const tz  = document.getElementById("tz").value.trim();
      const pl  = document.getElementById("place").value.trim() || "Manual";
      if (!q)               { alert("Enter a question first");        return; }
      if (isNaN(lat) || isNaN(lon)) { alert("Enter your coordinates"); return; }
      setLoading("loading", true, "Casting chart at this moment…");
      try {
        const data = await oraclePrashna({
          question:    q,
          asker_lat:   lat,
          asker_lon:   lon,
          asker_tz:    tz,
          asker_place: pl,
        });
        setLoading("loading", false);
        renderResult("result", data.markdown, data.metadata);
      } catch (err) {
        setLoading("loading", false);
        renderError("result", err);
      }
    });
  </script>
</body>
</html>
