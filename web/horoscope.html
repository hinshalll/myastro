<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Myastro — Horoscope</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
  <div id="nav"></div>
  <main class="max-w-3xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold text-purple-300 mb-2">📅 Horoscope</h1>
    <p class="text-slate-400 mb-6">Vedic forecast grounded in your Dasha + live transits.</p>

    <section class="p-5 rounded-xl bg-slate-900 border border-slate-800 mb-6 space-y-3">
      <div>
        <label class="block text-xs text-slate-400 mb-1">Profile</label>
        <div id="profile_picker"></div>
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">Timeframe</label>
        <select id="timeframe" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm">
          <option value="day">Today</option>
          <option value="week">This week</option>
          <option value="month">This month</option>
          <option value="year">This year</option>
        </select>
      </div>
      <button id="gen_btn" class="px-4 py-2 rounded-lg bg-purple-600 hover:bg-purple-500 text-white font-semibold text-sm">
        Generate forecast
      </button>
    </section>

    <div id="loading" class="hidden mb-4"></div>
    <div id="result" class="hidden"></div>
  </main>

  <script type="module">
    import { renderNav, renderProfilePicker, renderResult, setLoading, renderError } from "./shared/components.js";
    import { horoscopeVedic } from "./shared/api.js";
    import { toBackendProfile } from "./shared/state.js";

    renderNav("horoscope");

    let selected = null;
    renderProfilePicker("profile_picker", { onChange: p => { selected = p; } });

    document.getElementById("gen_btn").addEventListener("click", async () => {
      if (!selected) { alert("Pick a profile first"); return; }
      setLoading("loading", true, "Reading the transits…");
      try {
        const data = await horoscopeVedic({
          profile: toBackendProfile(selected),
          timeframe: document.getElementById("timeframe").value,
        });
        setLoading("loading", false);
        renderResult("result", data.markdown, data.metadata);
      } catch (err) {
        setLoading("loading", false);
        renderError("result", err);
      }
    });
  </script>
</body>
</html>
