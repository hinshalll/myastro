<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Myastro — Chat with Astrologer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
  <div id="nav"></div>
  <main class="max-w-3xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold text-purple-300 mb-2">💬 Chat with Astrologer</h1>
    <p class="text-slate-400 mb-6">Open-ended chat. AI reads your full chart + Vimshottari timing atlas for every answer.</p>

    <section class="p-5 rounded-xl bg-slate-900 border border-slate-800 mb-6">
      <label class="block text-xs text-slate-400 mb-1">Profile to consult about</label>
      <div id="profile_picker"></div>
    </section>

    <div id="chat" class="space-y-3 mb-4"></div>

    <form id="chat_form" class="flex gap-2">
      <input id="question" required class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm"
             placeholder="Ask anything — e.g. 'at what age will I start earning?'">
      <button type="submit" id="send_btn" class="px-4 py-2 rounded-lg bg-purple-600 hover:bg-purple-500 text-white font-semibold text-sm">
        Send
      </button>
    </form>

    <button id="clear_btn" class="mt-3 text-xs text-slate-500 hover:text-slate-300">
      Clear conversation
    </button>
  </main>

  <script type="module">
    import { renderNav, renderProfilePicker, renderMarkdown, escapeHtml, renderError } from "./shared/components.js";
    import { consultationAsk } from "./shared/api.js";
    import { toBackendProfile } from "./shared/state.js";

    renderNav("chat");

    let selected = null;
    renderProfilePicker("profile_picker", { onChange: p => { selected = p; } });

    const chat     = document.getElementById("chat");
    const form     = document.getElementById("chat_form");
    const input    = document.getElementById("question");
    const sendBtn  = document.getElementById("send_btn");
    const clearBtn = document.getElementById("clear_btn");

    let history = [];   // [{role: "user"|"assistant", content: "..."}]

    function renderChat() {
      chat.innerHTML = history.map(m => `
        <div class="p-3 rounded-lg ${m.role === "user"
          ? "bg-slate-800 border border-slate-700"
          : "bg-purple-950/30 border border-purple-900"}">
          <div class="text-xs uppercase tracking-wider mb-1 ${m.role === "user" ? "text-slate-400" : "text-purple-300"}">
            ${m.role === "user" ? "You" : "🪐 Astrologer"}
          </div>
          <div class="prose prose-invert prose-slate prose-sm max-w-none">
            ${m.role === "user" ? `<p>${escapeHtml(m.content)}</p>` : renderMarkdown(m.content)}
          </div>
        </div>
      `).join("");
      chat.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!selected) { alert("Pick a profile first"); return; }
      const q = input.value.trim();
      if (!q) return;

      history.push({ role: "user", content: q });
      renderChat();
      input.value = "";
      sendBtn.disabled = true;
      sendBtn.textContent = "Thinking…";

      // Add a placeholder for the assistant response
      const placeholder = { role: "assistant", content: "_thinking…_" };
      history.push(placeholder);
      renderChat();

      try {
        const data = await consultationAsk({
          profile: toBackendProfile(selected),
          question: q,
          history: history.slice(0, -1),   // exclude the placeholder
        });
        placeholder.content = data.markdown;
        renderChat();
      } catch (err) {
        history.pop();   // drop placeholder
        renderChat();
        const errSlot = document.createElement("div");
        chat.appendChild(errSlot);
        errSlot.id = "_err";
        renderError("_err", err);
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "Send";
      }
    });

    clearBtn.addEventListener("click", () => {
      if (history.length === 0) return;
      if (confirm("Clear the conversation?")) {
        history = [];
        renderChat();
      }
    });
  </script>
</body>
</html>
