<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Myastro — Numerology</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
  <div id="nav"></div>
  <main class="max-w-3xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold text-purple-300 mb-2">🔢 Numerology</h1>
    <p class="text-slate-400 mb-6">Profile from full name + date of birth.</p>

    <section class="p-5 rounded-xl bg-slate-900 border border-slate-800 mb-6 space-y-3">
      <div>
        <label class="block text-xs text-slate-400 mb-1">Full name</label>
        <input id="full_name" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm" placeholder="e.g. Hinshal Sharma">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-slate-400 mb-1">Date of birth</label>
          <input id="dob" type="date" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm">
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1">System</label>
          <select id="system" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm">
            <option value="chaldean">Chaldean</option>
            <option value="pythagorean">Pythagorean</option>
            <option value="vedic">Vedic</option>
          </select>
        </div>
      </div>
      <button id="gen_btn" class="px-4 py-2 rounded-lg bg-purple-600 hover:bg-purple-500 text-white font-semibold text-sm">
        Generate numerology
      </button>
    </section>

    <div id="loading" class="hidden mb-4"></div>
    <div id="result" class="hidden"></div>
  </main>

  <script type="module">
    import { renderNav, renderResult, setLoading, renderError } from "./shared/components.js";
    import { numerologyProfile } from "./shared/api.js";
    import { getDefaultProfile } from "./shared/state.js";

    renderNav("numerology");

    const dp = getDefaultProfile();
    if (dp) {
      document.getElementById("full_name").value = dp.name;
      document.getElementById("dob").value = dp.date;
    }

    document.getElementById("gen_btn").addEventListener("click", async () => {
      const full_name = document.getElementById("full_name").value.trim();
      const dob       = document.getElementById("dob").value;
      const system    = document.getElementById("system").value;
      if (!full_name || !dob) { alert("Fill name and DOB"); return; }
      setLoading("loading", true, "Computing…");
      try {
        const data = await numerologyProfile({ full_name, dob, system });
        setLoading("loading", false);
        renderResult("result", data.markdown, data.metadata);
      } catch (err) {
        setLoading("loading", false);
        renderError("result", err);
      }
    });
  </script>
</body>
</html>
